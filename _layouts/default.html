<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }} | Lismore Model Flying Club</title>

    <link href="/css/styles.css" rel="stylesheet" />
    <link href="/css/custom.css" rel="stylesheet" />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
      $(function(){
        $("#navContainer").load("/navbar.html");
        $("#cright").load("/copyright.html");
      });
    </script>
  </head>

  <body>
    <header>
      <h1 class="site-heading text-center text-faded d-none d-lg-block">
        <span class="site-heading-upper text-primary mb-3">Lismore Model Flying Club</span>
        <span class="site-heading-lower">Lismore, NSW</span>
      </h1>
    </header>

  <!-- Navigation-->
        <nav class="navbar navbar-expand-lg navbar-dark py-lg-4" id="mainNav">
            <div class="container" id="navContainer">
            </div>
        </nav>


    {{ content }}

    <footer class="footer text-faded text-center py-5">
      <div class="container" id="cright"></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/scripts.js"></script>

</html>
